  <text x="96" y="110" font-family="Inter, Arial, Helvetica, sans-serif" font-size="15" font-weight="800" letter-spacing="3" fill="#0f544d">WORKFLOW STORYBOARD</text>
  <text x="96" y="164" font-family="Inter, Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#171717">So wird aus Agentenarbeit ein belastbarer Lauf</text>
