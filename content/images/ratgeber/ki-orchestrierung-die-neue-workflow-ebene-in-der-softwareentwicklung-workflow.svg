  <rect x='572' y='644' width='230' height='32' rx='16' fill='#ffffff' stroke='rgba(15,84,77,0.08)'/>
  <rect x='816' y='644' width='220' height='32' rx='16' fill='#ffffff' stroke='rgba(15,84,77,0.08)'/>
  <text x='168' y='665' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#0f544d'>Kontext bleibt sichtbar</text>
  <text x='401' y='665' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#0f544d'>Status wird prüfbar</text>
  <text x='614' y='665' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#0f544d'>Parallelität bleibt kontrolliert</text>
  <text x='861' y='665' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#0f544d'>Review wird entlastet</text>
