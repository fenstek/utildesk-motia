  <rect width='1200' height='760' rx='44' fill='#f7f2e8'/>
  <rect x='54' y='54' width='1092' height='652' rx='38' fill='#fffaf3' stroke='rgba(15,84,77,0.12)'/>
  <text x='104' y='116' font-family='Inter, Arial, Helvetica, sans-serif' font-size='30' font-weight='700' fill='#0f544d'>So läuft ein orchestrierter KI-Workflow</text>
  <text x='104' y='150' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' fill='#4c6d67'>Qualität entsteht in der Reihenfolge aus Briefing, Koordination, Ausführung, Verifikation und Freigabe.</text>

  <path d='M170 254 H1030' stroke='rgba(15,84,77,0.14)' stroke-width='4' fill='none' stroke-linecap='round'/>

  <rect x='104' y='212' width='152' height='74' rx='26' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>
  <rect x='272' y='212' width='152' height='74' rx='26' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>
  <rect x='440' y='212' width='152' height='74' rx='26' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>
