  <circle cx='298' cy='249' r='16' fill='#0f544d'/><text x='292' y='255' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>2</text>
  <circle cx='464' cy='249' r='16' fill='#0f544d'/><text x='458' y='255' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>3</text>
  <circle cx='630' cy='249' r='16' fill='#0f544d'/><text x='624' y='255' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>4</text>
  <circle cx='796' cy='249' r='16' fill='#0f544d'/><text x='790' y='255' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>5</text>
  <circle cx='962' cy='249' r='16' fill='#d7a35c'/><text x='956' y='255' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>6</text>

  <text x='158' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Briefing</text>
  <text x='158' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Scope</text>
  <text x='324' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Planung</text>
  <text x='324' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Pakete</text>
  <text x='490' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Agentenlauf</text>
  <text x='490' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Parallel</text>
  <text x='656' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Prüfung</text>
  <text x='656' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Checks</text>
  <text x='822' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Review</text>
  <text x='822' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Verdichtung</text>
  <text x='988' y='243' font-family='Inter, Arial, Helvetica, sans-serif' font-size='19' font-weight='700' fill='#0f544d'>Merge</text>
  <text x='988' y='266' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' fill='#55746f'>Freigabe</text>

  <rect x='108' y='334' width='308' height='248' rx='28' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>
  <rect x='446' y='334' width='308' height='248' rx='28' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>
  <rect x='784' y='334' width='312' height='248' rx='28' fill='#ffffff' stroke='rgba(15,84,77,0.10)' filter='url(#soft)'/>

  <text x='136' y='378' font-family='Inter, Arial, Helvetica, sans-serif' font-size='17' font-weight='700' fill='#0f544d'>VOR DEM LAUF</text>
  <text x='136' y='418' font-family='Inter, Arial, Helvetica, sans-serif' font-size='28' font-weight='700' fill='#0f544d'>Ausrichtung</text>
  <rect x='136' y='438' width='88' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <rect x='232' y='438' width='98' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <text x='159' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Zielbild</text>
  <text x='261' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Guardrails</text>
  <text x='136' y='492' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='400' fill='#55746f'><tspan x='136' dy='0'>Ein orchestrierter Workflow</tspan><tspan x='136' dy='23'>beginnt mit einem belastbaren</tspan><tspan x='136' dy='23'>Briefing: Zielbild, Rollen und</tspan><tspan x='136' dy='23'>Guardrails stehen vor dem</tspan><tspan x='136' dy='23'>ersten Lauf fest.</tspan></text>

  <text x='474' y='378' font-family='Inter, Arial, Helvetica, sans-serif' font-size='17' font-weight='700' fill='#0f544d'>WÄHREND DES LAUFS</text>
  <text x='474' y='418' font-family='Inter, Arial, Helvetica, sans-serif' font-size='28' font-weight='700' fill='#0f544d'>Steuerung</text>
  <rect x='474' y='438' width='92' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <rect x='574' y='438' width='112' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <text x='499' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Pakete</text>
  <text x='603' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Kontextfluss</text>
  <text x='474' y='492' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='400' fill='#55746f'><tspan x='474' dy='0'>Während der Ausführung</tspan><tspan x='474' dy='23'>verteilt die Kontrollschicht</tspan><tspan x='474' dy='23'>Arbeit, hält Kontext sauber</tspan><tspan x='474' dy='23'>und prüft Zwischenergebnisse</tspan><tspan x='474' dy='23'>gegen klare Kriterien.</tspan></text>

  <text x='812' y='378' font-family='Inter, Arial, Helvetica, sans-serif' font-size='17' font-weight='700' fill='#0f544d'>VOR DEM MERGE</text>
  <text x='812' y='418' font-family='Inter, Arial, Helvetica, sans-serif' font-size='28' font-weight='700' fill='#0f544d'>Absicherung</text>
  <rect x='812' y='438' width='78' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <rect x='898' y='438' width='86' height='28' rx='14' fill='rgba(15,84,77,0.06)'/>
  <text x='835' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Review</text>
  <text x='923' y='457' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' font-weight='700' fill='#0f544d'>Freigabe</text>
  <text x='812' y='492' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='400' fill='#55746f'><tspan x='812' dy='0'>Vor dem Merge werden Tests,</tspan><tspan x='812' dy='23'>Review und Freigabe gebündelt,</tspan><tspan x='812' dy='23'>damit aus Parallelität kein</tspan><tspan x='812' dy='23'>unkontrollierter Wildwuchs</tspan><tspan x='812' dy='23'>wird.</tspan></text>

  <text x='108' y='612' font-family='Inter, Arial, Helvetica, sans-serif' font-size='17' font-weight='700' fill='#0f544d'>Operativer Effekt</text>
