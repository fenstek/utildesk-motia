  <text x='104' y='118' font-family='Arial, Helvetica, sans-serif' font-size='28' font-weight='700' fill='#0f544d'>So läuft ein orchestrierter KI-Workflow</text>
  <text x='104' y='152' font-family='Arial, Helvetica, sans-serif' font-size='18' fill='#4c6d67'>Die Qualität entsteht nicht nur im Modell, sondern in der Reihenfolge aus Briefing, Koordination, Ausführung und Verifikation.</text>

