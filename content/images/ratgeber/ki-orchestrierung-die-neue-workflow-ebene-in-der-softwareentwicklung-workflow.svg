  <text x='132' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Briefing</text>
  <text x='132' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Zielbild und</text>
  <text x='132' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Akzeptanzkriterien</text>

  <text x='308' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Planung</text>
  <text x='308' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Pakete, Rollen</text>
  <text x='308' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>und Prioritäten</text>

  <text x='474' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Agenten</text>
  <text x='474' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Parallele</text>
  <text x='474' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Ausführung</text>

  <text x='642' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Prüfung</text>
  <text x='642' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Tests, Specs,</text>
  <text x='642' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Guardrails</text>

  <text x='812' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Review</text>
  <text x='812' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Menschliche</text>
  <text x='812' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Entscheidung</text>

  <text x='986' y='384' font-family='Arial, Helvetica, sans-serif' font-size='20' font-weight='700' fill='#0f544d'>Merge</text>
  <text x='986' y='412' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Freigabe und</text>
  <text x='986' y='434' font-family='Arial, Helvetica, sans-serif' font-size='16' fill='#446661'>Übergabe</text>

  <rect x='108' y='516' width='988' height='148' rx='28' fill='rgba(15,84,77,0.05)' stroke='rgba(15,84,77,0.10)'/>
  <text x='144' y='566' font-family='Arial, Helvetica, sans-serif' font-size='22' font-weight='700' fill='#0f544d'>Sichtbarkeit über Sitzungen und Status</text>
  <text x='144' y='600' font-family='Arial, Helvetica, sans-serif' font-size='17' fill='#446661'>Damit parallele Arbeit beherrschbar bleibt, brauchen Teams einen gemeinsamen Blick auf Kontext, offene Fragen, Teststatus und Verantwortlichkeiten.</text>
