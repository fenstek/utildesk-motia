    <text x='942' y='252' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#fffaf3'>Kontext</text>
    <text x='936' y='278' font-family='Inter, Arial, Helvetica, sans-serif' font-size='13' fill='rgba(255,250,243,0.76)'>sichtbar</text>
