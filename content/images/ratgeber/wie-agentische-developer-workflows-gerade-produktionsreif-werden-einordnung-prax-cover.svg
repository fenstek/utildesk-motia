<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="workflowCoverBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2f2b"/>
      <stop offset="100%" stop-color="#0f544d"/>
    </linearGradient>
    <linearGradient id="workflowCanvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ee"/>
      <stop offset="100%" stop-color="#efe4d4"/>
    </linearGradient>
    <filter id="workflowShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0a221f" flood-opacity="0.20"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#d58f49" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="34" fill="#f7f2e8"/>
  <rect x="10" y="10" width="1180" height="740" rx="32" fill="url(#workflowCanvas)" stroke="rgba(15,84,77,0.08)"/>
  <rect x="24" y="24" width="1152" height="712" rx="30" fill="url(#workflowCoverBg)"/>

  <circle cx="1000" cy="170" r="118" fill="rgba(213,143,73,0.10)"/>
  <circle cx="904" cy="620" r="168" fill="rgba(255,250,243,0.07)"/>

  <rect x="56" y="56" width="196" height="40" rx="20" fill="rgba(255,250,243,0.14)"/>
  <text x="84" y="82" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#fffaf3">Developer Workflow</text>

  <text x="58" y="152" font-family="Inter, Arial, Helvetica, sans-serif" font-size="60" font-weight="700" fill="#fffaf3">
    <tspan x="58" dy="0">agentische</tspan>
    <tspan x="58" dy="64">Developer-Workflows</tspan>
    <tspan x="58" dy="64">gerade</tspan>
  </text>

  <text x="58" y="404" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="rgba(255,250,243,0.84)">
    <tspan x="58" dy="0">Den Trend einordnen, die Mechanik</tspan>
    <tspan x="58" dy="30">erkl&#228;ren und die Folgen f&#252;r Teams</tspan>
    <tspan x="58" dy="30">greifbar machen</tspan>
  </text>

  <text x="58" y="624" font-family="Inter, Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#d58f49">Von der Spezifikation bis zum Merge</text>
  <text x="58" y="656" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" fill="rgba(255,250,243,0.76)">Nicht als Schaubild-Tabelle, sondern als redaktionelle Szene f&#252;r produktive Agentenarbeit.</text>

  <g filter="url(#workflowShadow)">
    <rect x="596" y="72" width="542" height="290" rx="32" fill="#102926" stroke="rgba(255,250,243,0.14)"/>
    <rect x="596" y="72" width="542" height="46" rx="32" fill="rgba(255,250,243,0.08)"/>
    <circle cx="630" cy="95" r="7" fill="#ff7f66"/>
    <circle cx="652" cy="95" r="7" fill="#ffd166"/>
    <circle cx="674" cy="95" r="7" fill="#5fd08a"/>
    <text x="708" y="101" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="rgba(255,250,243,0.82)">IDE + Kontext</text>

    <rect x="626" y="154" width="132" height="28" rx="14" fill="rgba(255,250,243,0.10)"/>
    <text x="656" y="173" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#fffaf3">IDE</text>
    <rect x="626" y="202" width="138" height="12" rx="6" fill="rgba(255,250,243,0.12)"/>
    <rect x="626" y="228" width="306" height="12" rx="6" fill="rgba(255,250,243,0.18)"/>
    <rect x="626" y="254" width="284" height="12" rx="6" fill="rgba(255,250,243,0.14)"/>
    <rect x="626" y="282" width="186" height="12" rx="6" fill="rgba(255,250,243,0.10)"/>

    <rect x="968" y="190" width="116" height="108" rx="26" fill="rgba(213,143,73,0.16)" stroke="rgba(213,143,73,0.24)"/>
    <text x="992" y="235" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#fffaf3">Kontext</text>
    <text x="990" y="264" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,250,243,0.78)">sichtbar</text>
  </g>

  <g filter="url(#workflowShadow)">
    <rect x="654" y="382" width="300" height="186" rx="30" fill="#142e2b" stroke="rgba(255,250,243,0.12)"/>
    <text x="684" y="424" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700" fill="#d58f49">CLI / Agentenlauf</text>
    <text x="684" y="466" font-family="JetBrains Mono, Consolas, monospace" font-size="14" fill="rgba(255,250,243,0.78)">&gt; plan task graph</text>
    <text x="684" y="496" font-family="JetBrains Mono, Consolas, monospace" font-size="14" fill="rgba(255,250,243,0.78)">&gt; run worker shards</text>
    <text x="684" y="526" font-family="JetBrains Mono, Consolas, monospace" font-size="14" fill="rgba(255,250,243,0.78)">&gt; collect checks</text>
    <rect x="684" y="540" width="120" height="24" rx="12" fill="rgba(255,250,243,0.10)"/>
    <text x="712" y="556" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#fffaf3">CLI</text>
  </g>

  <g filter="url(#softGlow)">
    <rect x="982" y="370" width="120" height="246" rx="28" fill="#fffaf3" stroke="rgba(15,84,77,0.10)"/>
    <text x="1008" y="420" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f544d">Review</text>
    <rect x="1006" y="444" width="78" height="24" rx="12" fill="rgba(15,84,77,0.08)"/>
    <text x="1022" y="460" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0f544d">Verifikation</text>
    <rect x="1006" y="492" width="76" height="10" rx="5" fill="rgba(15,84,77,0.14)"/>
    <rect x="1006" y="516" width="60" height="10" rx="5" fill="rgba(15,84,77,0.10)"/>
    <rect x="1006" y="540" width="40" height="10" rx="5" fill="rgba(15,84,77,0.08)"/>
    <path d="M1014 580 L1040 606 L1080 552" stroke="#d58f49" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <path d="M850 362 C850 388 820 406 794 420" stroke="rgba(255,250,243,0.24)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M980 300 C1016 324 1042 352 1056 388" stroke="rgba(255,250,243,0.22)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <rect x="58" y="668" width="76" height="30" rx="15" fill="rgba(255,250,243,0.14)"/>
  <text x="84" y="687" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#fffaf3">IDE</text>
  <rect x="146" y="668" width="76" height="30" rx="15" fill="rgba(255,250,243,0.14)"/>
  <text x="172" y="687" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#fffaf3">CLI</text>
  <rect x="234" y="668" width="102" height="30" rx="15" fill="rgba(255,250,243,0.14)"/>
  <text x="260" y="687" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#fffaf3">Kontext</text>
  <rect x="348" y="668" width="126" height="30" rx="15" fill="rgba(255,250,243,0.14)"/>
  <text x="374" y="687" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#fffaf3">Verifikation</text>
</svg>
