  <text x='108' y='208' font-family='Inter, Arial, Helvetica, sans-serif' font-size='44' font-weight='700' fill='#fffaf3'><tspan x='108' dy='0'>agentische</tspan><tspan x='108' dy='48'>Developer-Workflows</tspan><tspan x='108' dy='48'>gerade</tspan></text>
  <text x='108' y='386' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='400' fill='rgba(255,250,243,0.84)'><tspan x='108' dy='0'>Den Trend einordnen, die Mechanik</tspan><tspan x='108' dy='24'>erklären und die Folgen für Teams</tspan><tspan x='108' dy='24'>greifbar machen</tspan></text>
  <text x='108' y='560' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#d58f49'>Von der Spezifikation bis zum Merge</text>
  <text x='108' y='588' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' fill='rgba(255,250,243,0.72)'>Nicht als Schaubild-Tabelle, sondern als redaktionelle Szene für produktive Agentenarbeit.</text>
  <rect x='110' y='618' width='88' height='34' rx='17' fill='rgba(255,250,243,0.14)' stroke='rgba(255,250,243,0.14)'/><text x='130' y='640' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='700' fill='#fffaf3'>IDE</text><rect x='210' y='618' width='88' height='34' rx='17' fill='rgba(255,250,243,0.14)' stroke='rgba(255,250,243,0.14)'/><text x='230' y='640' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='700' fill='#fffaf3'>CLI</text><rect x='310' y='618' width='91' height='34' rx='17' fill='rgba(255,250,243,0.14)' stroke='rgba(255,250,243,0.14)'/><text x='330' y='640' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='700' fill='#fffaf3'>Kontext</text><rect x='413' y='618' width='136' height='34' rx='17' fill='rgba(255,250,243,0.14)' stroke='rgba(255,250,243,0.14)'/><text x='433' y='640' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='700' fill='#fffaf3'>Verifikation</text>

