    <text x='706' y='506' font-family='JetBrains Mono, Consolas, monospace' font-size='14' fill='rgba(255,250,243,0.78)'>&gt; run worker shards</text>
    <text x='706' y='532' font-family='JetBrains Mono, Consolas, monospace' font-size='14' fill='rgba(255,250,243,0.78)'>&gt; collect checks</text>
