<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Vergleich von ChatGPT, Claude und Gemini">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafaf1"/>
      <stop offset="100%" stop-color="#eef3ee"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5ee"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#367b71"/>
      <stop offset="100%" stop-color="#176259"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dde5e2"/>
      <stop offset="100%" stop-color="#b8c7c1"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3dfbf"/>
      <stop offset="100%" stop-color="#d9b06d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1a1c170c"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1018" cy="108" r="118" fill="#1762590e"/>
  <circle cx="156" cy="596" r="144" fill="#367b710d"/>

  <rect x="80" y="72" width="214" height="42" rx="21" fill="#ffffff" opacity="0.68"/>
  <text x="102" y="100" fill="#176259" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="800" letter-spacing="2.2">RATGEBER</text>
  <text x="80" y="178" fill="#1a1c17" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="50" font-weight="800" letter-spacing="-1.1">ChatGPT, Claude und Gemini</text>
  <text x="80" y="224" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="21">Ein ruhiger Vergleich der drei grossen KI-Assistenten fuer Alltag, Recherche und produktive Arbeit.</text>

  <g transform="translate(80 290)" filter="url(#shadow)">
    <rect width="1040" height="322" rx="32" fill="#ffffff"/>
    <g transform="translate(34 36)">
      <rect width="972" height="250" rx="24" fill="url(#panel)"/>
      <rect x="28" y="28" width="916" height="10" rx="5" fill="#e5e9e5"/>
      <rect x="28" y="28" width="280" height="10" rx="5" fill="#176259"/>

      <g transform="translate(28 66)">
        <rect width="282" height="138" rx="22" fill="#ffffff"/>
        <rect x="18" y="18" width="48" height="48" rx="16" fill="url(#teal)"/>
        <path d="M42 30c7 0 13 6 13 13s-6 13-13 13-13-6-13-13 6-13 13-13Z" fill="none" stroke="#fff" stroke-width="2"/>
        <text x="86" y="42" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="24" font-weight="800">ChatGPT</text>
        <text x="86" y="68" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="16">Schnelle Entwuerfe</text>
        <text x="18" y="110" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Flexibel, schnell und breit einsetzbar.</text>
      </g>

      <g transform="translate(344 66)">
        <rect width="282" height="138" rx="22" fill="#ffffff"/>
        <rect x="18" y="18" width="48" height="48" rx="16" fill="url(#soft)"/>
        <path d="M38 28h20l6 20-10 12H34l-6-12 10-20Z" fill="none" stroke="#176259" stroke-width="2" stroke-linejoin="round"/>
        <text x="86" y="42" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="24" font-weight="800">Claude</text>
        <text x="86" y="68" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="16">Lange Kontexte</text>
        <text x="18" y="110" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Stark bei Struktur, Ton und Tiefe.</text>
      </g>

      <g transform="translate(660 66)">
        <rect width="282" height="138" rx="22" fill="#ffffff"/>
        <rect x="18" y="18" width="48" height="48" rx="16" fill="url(#amber)"/>
        <circle cx="42" cy="42" r="12" fill="none" stroke="#7f4f12" stroke-width="2"/>
        <text x="86" y="42" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="24" font-weight="800">Gemini</text>
        <text x="86" y="68" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="16">Google-nahe Workflows</text>
        <text x="18" y="110" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Praktisch fuer Suche, Docs und Teams.</text>
      </g>

      <g transform="translate(28 224)">
        <rect width="916" height="2" rx="1" fill="#e5e9e5"/>
        <text x="0" y="34" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Einordnung: ChatGPT fuer Tempo, Claude fuer Tiefe, Gemini fuer integrierte Alltags-Workflows.</text>
      </g>
    </g>
  </g>
</svg>
