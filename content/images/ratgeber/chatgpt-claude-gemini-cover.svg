<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="ChatGPT, Claude und Gemini im Vergleich">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f4eb"/>
      <stop offset="100%" stop-color="#eef2ed"/>
    </linearGradient>
    <linearGradient id="bar-a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#176259"/>
      <stop offset="100%" stop-color="#367b71"/>
    </linearGradient>
    <linearGradient id="bar-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8faaa4"/>
      <stop offset="100%" stop-color="#bec9c5"/>
    </linearGradient>
    <linearGradient id="bar-c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a35a"/>
      <stop offset="100%" stop-color="#e8c87a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#1a1c17" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="320" fill="#17625906"/>
  <circle cx="1560" cy="840" r="260" fill="#367b7105"/>

  <!-- Header -->
  <text x="80" y="80" fill="#176259" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="800" letter-spacing="5">RATGEBER · KI-VERGLEICH</text>
  <text x="80" y="146" fill="#1a1c17" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="58" font-weight="800" letter-spacing="-2">ChatGPT, Claude &amp; Gemini</text>
  <text x="80" y="190" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="22">Drei Modelle. Drei Stärken. Eine Entscheidung.</text>
  <line x1="80" y1="214" x2="340" y2="214" stroke="#176259" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Card A: ChatGPT -->
  <g filter="url(#shadow)">
    <rect x="80" y="248" width="452" height="580" rx="28" fill="#ffffff"/>
    <rect x="80" y="248" width="452" height="6" rx="3" fill="url(#bar-a)"/>

    <rect x="108" y="290" width="60" height="60" rx="16" fill="#176259"/>
    <path d="M138 306 l8 12 -8 12 -8 -12 z" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="138" cy="318" r="5" fill="#fff" fill-opacity="0.9"/>

    <text x="108" y="382" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="800">ChatGPT</text>
    <text x="108" y="406" fill="#176259" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2">OPENAI</text>

    <text x="108" y="448" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Breit aufgestellt, schnell und flexibel.</text>
    <text x="108" y="470" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Ideal für Ideation und kreative</text>
    <text x="108" y="492" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Erstfassungen.</text>

    <text x="108" y="546" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">VIELSEITIGKEIT</text>
    <rect x="108" y="554" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="108" y="554" width="366" height="7" rx="3.5" fill="url(#bar-a)"/>

    <text x="108" y="586" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">GESCHWINDIGKEIT</text>
    <rect x="108" y="594" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="108" y="594" width="376" height="7" rx="3.5" fill="url(#bar-a)"/>

    <text x="108" y="626" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">KONTEXTTIEFE</text>
    <rect x="108" y="634" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="108" y="634" width="268" height="7" rx="3.5" fill="url(#bar-a)"/>

    <rect x="108" y="764" width="136" height="34" rx="17" fill="#17625914"/>
    <text x="126" y="786" fill="#176259" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="700">Allrounder</text>
  </g>

  <!-- Card B: Claude -->
  <g filter="url(#shadow)">
    <rect x="574" y="248" width="452" height="580" rx="28" fill="#ffffff"/>
    <rect x="574" y="248" width="452" height="6" rx="3" fill="url(#bar-b)"/>

    <rect x="602" y="290" width="60" height="60" rx="16" fill="#8faaa4"/>
    <path d="M632 306 l0 24 M620 318 l24 0" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="632" cy="318" r="8" fill="none" stroke="#fff" stroke-width="2.2"/>

    <text x="602" y="382" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="800">Claude</text>
    <text x="602" y="406" fill="#8faaa4" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2">ANTHROPIC</text>

    <text x="602" y="448" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Ruhig, präzise, kontextstark.</text>
    <text x="602" y="470" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Beste Wahl für lange Texte,</text>
    <text x="602" y="492" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Analyse und Argumentation.</text>

    <text x="602" y="546" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">VIELSEITIGKEIT</text>
    <rect x="602" y="554" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="602" y="554" width="286" height="7" rx="3.5" fill="url(#bar-b)"/>

    <text x="602" y="586" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">GESCHWINDIGKEIT</text>
    <rect x="602" y="594" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="602" y="594" width="258" height="7" rx="3.5" fill="url(#bar-b)"/>

    <text x="602" y="626" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">KONTEXTTIEFE</text>
    <rect x="602" y="634" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="602" y="634" width="388" height="7" rx="3.5" fill="url(#bar-b)"/>

    <rect x="602" y="764" width="148" height="34" rx="17" fill="#8faaa420"/>
    <text x="618" y="786" fill="#5f7a74" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="700">Tiefe &amp; Präzision</text>
  </g>

  <!-- Card C: Gemini -->
  <g filter="url(#shadow)">
    <rect x="1068" y="248" width="452" height="580" rx="28" fill="#ffffff"/>
    <rect x="1068" y="248" width="452" height="6" rx="3" fill="url(#bar-c)"/>

    <rect x="1096" y="290" width="60" height="60" rx="16" fill="#c8a35a"/>
    <path d="M1126 306 Q1138 318 1126 330 Q1114 318 1126 306 Z" fill="#fff" fill-opacity="0.4"/>
    <path d="M1110 318 Q1126 306 1142 318 Q1126 330 1110 318 Z" fill="#fff" fill-opacity="0.4"/>
    <circle cx="1126" cy="318" r="5" fill="#fff"/>

    <text x="1096" y="382" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="800">Gemini</text>
    <text x="1096" y="406" fill="#c8a35a" font-family="Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2">GOOGLE</text>

    <text x="1096" y="448" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Tief ins Google-Ökosystem</text>
    <text x="1096" y="470" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">integriert. Stark bei Suche,</text>
    <text x="1096" y="492" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="15">Docs und Team-Workflows.</text>

    <text x="1096" y="546" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">VIELSEITIGKEIT</text>
    <rect x="1096" y="554" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="1096" y="554" width="236" height="7" rx="3.5" fill="url(#bar-c)"/>

    <text x="1096" y="586" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">GESCHWINDIGKEIT</text>
    <rect x="1096" y="594" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="1096" y="594" width="296" height="7" rx="3.5" fill="url(#bar-c)"/>

    <text x="1096" y="626" fill="#1a1c17" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="1">INTEGRATION</text>
    <rect x="1096" y="634" width="396" height="7" rx="3.5" fill="#e4e8e4"/>
    <rect x="1096" y="634" width="368" height="7" rx="3.5" fill="url(#bar-c)"/>

    <rect x="1096" y="764" width="166" height="34" rx="17" fill="#c8a35a18"/>
    <text x="1112" y="786" fill="#a07e3a" font-family="Plus Jakarta Sans, sans-serif" font-size="13" font-weight="700">Google-Workflows</text>
  </g>
</svg>
