  <rect x='84' y='232' width='1032' height='82' rx='24' fill='#ffffff' stroke='rgba(15,84,77,0.06)'/><text x='118' y='263' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Schnelle Entwürfe &amp; Ideation</text><text x='118' y='288' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Mails, Posts, grobe Konzepte,</tspan><tspan x='118' dy='18'>erste Richtungen</tspan></text><rect x='560' y='254' width='184' height='40' rx='20' fill='rgba(23,98,89,0.10)'/><text x='590' y='279' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#176259'>Beste Wahl: ChatGPT</text><rect x='760' y='254' width='160' height='40' rx='20' fill='rgba(199,157,75,0.16)' opacity='0.82'/><text x='786' y='279' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#c79d4b'>Auch stark: Gemini</text><text x='948' y='267' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Breit, schnell und flexibel</tspan><tspan x='948' dy='18'>im ersten Wurf.</tspan></text><rect x='84' y='326' width='1032' height='82' rx='24' fill='#faf8f2' stroke='rgba(15,84,77,0.06)'/><text x='118' y='357' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Lange Texte &amp; Argumentation</text><text x='118' y='382' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Recherche, Redigieren,</tspan><tspan x='118' dy='18'>strukturierte Ausarbeitung</tspan></text><rect x='560' y='348' width='184' height='40' rx='20' fill='rgba(127,153,148,0.14)'/><text x='590' y='373' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#7f9994'>Beste Wahl: Claude</text><rect x='760' y='348' width='160' height='40' rx='20' fill='rgba(23,98,89,0.10)' o