nformationssammlung,</tspan><tspan x='118' dy='18'>Einordnung, anschließendes</tspan></text><rect x='560' y='536' width='184' height='40' rx='20' fill='rgba(127,153,148,0.14)'/><text x='590' y='561' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#7f9994'>Beste Wahl: Claude</text><rect x='760' y='536' width='160' height='40' rx='20' fill='rgba(23,98,89,0.10)' opacity='0.82'/><text x='786' y='561' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#176259'>Auch stark: ChatGPT</text><text x='948' y='549' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Gut, wenn Kontexttiefe und</tspan><tspan x='948' dy='18'>redaktioneller Ton zählen.</tspan></text>
