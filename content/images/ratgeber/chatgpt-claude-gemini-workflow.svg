    <text x="804" y="666" fill="#8faaa4" font-family="Inter, sans-serif" font-size="20">★★★★☆</text>
    <text x="1084" y="666" fill="#c8a35a" font-family="Inter, sans-serif" font-size="20">★★☆☆☆</text>
