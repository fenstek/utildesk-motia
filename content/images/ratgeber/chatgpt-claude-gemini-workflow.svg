    <line x1="500" y1="266" x2="500" y2="710" stroke="#e8ede9" stroke-width="1"/>
    <line x1="780" y1="266" x2="780" y2="710" stroke="#e8ede9" stroke-width="1"/>
    <line x1="1060" y1="266" x2="1060" y2="710" stroke="#e8ede9" stroke-width="1"/>

