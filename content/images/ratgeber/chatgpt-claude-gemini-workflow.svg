  <!-- Legend -->
  <text x="80" y="740" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="13">★★★★★ Sehr stark  ·  ★★★★☆ Stark  ·  ★★★☆☆ Gut  ·  ★★☆☆☆ Eingeschränkt</text>
