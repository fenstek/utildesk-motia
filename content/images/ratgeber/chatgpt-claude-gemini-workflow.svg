<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-label="Vergleich typischer Einsatzszenarien">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafaf1"/>
      <stop offset="100%" stop-color="#eef2ed"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#176259"/>
      <stop offset="100%" stop-color="#367b71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1a1c170f"/>
    </filter>
  </defs>

  <rect width="1500" height="760" fill="url(#bg)"/>
  <text x="84" y="96" fill="#1a1c17" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.4">Typische Einsatzszenarien</text>
  <text x="84" y="146" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="24">Welcher Assistent fuehlt sich in welchem Arbeitsmodus am natuerlichsten an?</text>

  <g transform="translate(84 216)" filter="url(#shadow)">
    <rect width="1332" height="428" rx="36" fill="#ffffff"/>

    <g transform="translate(42 44)">
      <rect width="380" height="340" rx="28" fill="#f6f7f1"/>
      <text x="28" y="48" fill="#176259" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="800" letter-spacing="2">CHATGPT</text>
      <text x="28" y="100" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="34" font-weight="800">Schneller Entwurf</text>
      <text x="28" y="142" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="20">Stark bei Ideation, Erstfassungen und schnellen Richtungswechseln.</text>
      <rect x="28" y="224" width="300" height="12" rx="6" fill="#dde8e3"/>
      <rect x="28" y="224" width="266" height="12" rx="6" fill="#176259"/>
      <text x="28" y="274" fill="#1a1c17" font-family="Inter, sans-serif" font-size="16" font-weight="700">Tempo und Flexibilitaet</text>
    </g>

    <g transform="translate(476 44)">
      <rect width="380" height="340" rx="28" fill="#f6f7f1"/>
      <text x="28" y="48" fill="#176259" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="800" letter-spacing="2">CLAUDE</text>
      <text x="28" y="100" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="34" font-weight="800">Langer Kontext</text>
      <text x="28" y="142" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="20">Besonders angenehm bei strukturierter Analyse, langen Texten und Refactoring.</text>
      <rect x="28" y="224" width="300" height="12" rx="6" fill="#dde8e3"/>
      <rect x="28" y="224" width="234" height="12" rx="6" fill="#9eb8b1"/>
      <text x="28" y="274" fill="#1a1c17" font-family="Inter, sans-serif" font-size="16" font-weight="700">Tiefe und Kohaerenz</text>
    </g>

    <g transform="translate(910 44)">
      <rect width="380" height="340" rx="28" fill="#f6f7f1"/>
      <text x="28" y="48" fill="#176259" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="800" letter-spacing="2">GEMINI</text>
      <text x="28" y="100" fill="#1a1c17" font-family="Plus Jakarta Sans, sans-serif" font-size="34" font-weight="800">Google-Flows</text>
      <text x="28" y="142" fill="#5f5e5e" font-family="Inter, sans-serif" font-size="20">Sinnvoll, wenn Suche, Dokumente und Team-Workflows nah zusammenliegen.</text>
      <rect x="28" y="224" width="300" height="12" rx="6" fill="#dde8e3"/>
      <rect x="28" y="224" width="244" height="12" rx="6" fill="#d8b06d"/>
      <text x="28" y="274" fill="#1a1c17" font-family="Inter, sans-serif" font-size="16" font-weight="700">Integration und Kontext</text>
    </g>

    <path d="M422 214H476" fill="none" stroke="url(#track)" stroke-width="6" stroke-linecap="round"/>
    <path d="M856 214H910" fill="none" stroke="url(#track)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
