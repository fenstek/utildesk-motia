  <text x='104' y='118' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='800' letter-spacing='3' fill='#0f544d'>ENTSCHEIDUNGSKARTE</text>
  <text x='104' y='172' font-family='Inter, Arial, Helvetica, sans-serif' font-size='42' font-weight='700' fill='#171717'>Welche Wahl passt zu welchem Workflow?</text>
  <text x='104' y='208' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' fill='#55635d'>Keine Sternchentabelle, sondern eine klare Lesart für typische Einsatzlagen.</text>
  <rect x='84' y='250' width='1032' height='86' rx='24' fill='#ffffff' stroke='rgba(15,84,77,0.06)'/><text x='118' y='284' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Schnelle Entwürfe &amp; Ideation</text><text x='118' y='310' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Mails, Posts, grobe Konzepte,</tspan><tspan x='118' dy='20'>erste Richtungen</tspan></text><rect x='560' y='272' width='184' height='40' rx='20' fill='rgba(23,98,89,0.10)'/><text x='590' y='297' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#176259'>Beste Wahl: ChatGPT</text><rect x='760' y='272' width='160' height='40' rx='20' fill='rgba(199,157,75,0.16)' opacity='0.82'/><text x='786' y='297' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#c79d4b'>Auch stark: Gemini</text><text x='948' y='289' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Breit, schnell und flexibel</tspan><tspan x='948' dy='19'>im ersten Wurf.</tspan></text><rect x='84' y='358' width='1032' height='86' rx='24' fill='#faf8f2' stroke='rgba(15,84,77,0.06)'/><text x='118' y='392' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Lange Texte &amp; Argumentation</text><text x='118' y='418' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Recherche, Redigieren,</tspan><tspan x='118' dy='20'>strukturierte Ausarbeitung</tspan></text><rect x='560' y='380' width='184' height='40' rx='20' fill='rgba(127,153,148,0.14)'/><text x='590' y='405' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#7f9994'>Beste Wahl: Claude</text><rect x='760' y='380' width='160' height='40' rx='20' fill='rgba(23,98,89,0.10)' opacity='0.82'/><text x='786' y='405' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#176259'>Auch stark: ChatGPT</text><text x='948' y='397' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Ruhiger Ton und stabil bei</tspan><tspan x='948' dy='19'>längeren Gedankengängen.</tspan></text><rect x='84' y='466' width='1032' height='86' rx='24' fill='#ffffff' stroke='rgba(15,84,77,0.06)'/><text x='118' y='500' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Google-basierte Teamarbeit</text><text x='118' y='526' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Docs, Suche, Mails und</tspan><tspan x='118' dy='20'>kollaborative Arbeitsräume</tspan></text><rect x='560' y='488' width='184' height='40' rx='20' fill='rgba(199,157,75,0.16)'/><text x='590' y='513' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#c79d4b'>Beste Wahl: Gemini</text><rect x='760' y='488' width='160' height='40' rx='20' fill='rgba(23,98,89,0.10)' opacity='0.82'/><text x='786' y='513' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#176259'>Auch stark: ChatGPT</text><text x='948' y='505' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Stark, wenn der Workflow</tspan><tspan x='948' dy='19'>schon auf Google aufsetzt.</tspan></text><rect x='84' y='574' width='1032' height='86' rx='24' fill='#faf8f2' stroke='rgba(15,84,77,0.06)'/><text x='118' y='608' font-family='Inter, Arial, Helvetica, sans-serif' font-size='18' font-weight='700' fill='#171717'>Recherche mit sauberer Verdichtung</text><text x='118' y='634' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='400' fill='#5c5f59'><tspan x='118' dy='0'>Informationssammlung,</tspan><tspan x='118' dy='20'>Einordnung, anschließendes</tspan></text><rect x='560' y='596' width='184' height='40' rx='20' fill='rgba(127,153,148,0.14)'/><text x='590' y='621' font-family='Inter, Arial, Helvetica, sans-serif' font-size='16' font-weight='700' fill='#7f9994'>Beste Wahl: Claude</text><rect x='760' y='596' width='160' height='40' rx='20' fill='rgba(23,98,89,0.10)' opacity='0.82'/><text x='786' y='621' font-family='Inter, Arial, Helvetica, sans-serif' font-size='15' font-weight='700' fill='#176259'>Auch stark: ChatGPT</text><text x='948' y='613' font-family='Inter, Arial, Helvetica, sans-serif' font-size='14' font-weight='400' fill='#55635d'><tspan x='948' dy='0'>Gut, wenn Kontexttiefe und</tspan><tspan x='948' dy='19'>redaktioneller Ton zählen.</tspan></text>
