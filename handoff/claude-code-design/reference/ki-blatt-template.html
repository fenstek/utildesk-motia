    if (!slot || !slot.hasAttribute('data-filled')) return; // empty → let slot open file browser
    const img = slot.shadowRoot && slot.shadowRoot.querySelector('img[part="image"]');
    const url = img && img.getAttribute('src');
    if (url) { e.preventDefault(); e.stopPropagation(); setZoom(url); }
  };

  return (
    <div style={{
      ...s.inner, padding:'40px 56px 0',

function DSInventar() {
  const p = window.dsPalette, s = window.dsS;
  const [view, setView] = React.useState('register'); // 'register' | 'setzkasten'
  const [sort, setSort] = React.useState('new');      // 'new' | 'az' | 'verdict' | 'category'

  const tools = React.useMemo(() => {
    const list = [...INV_POOL];
    if (sort === 'az')        list.sort((a,b) => a.name.localeCompare(b.name));
    if (sort === 'verdict')   list.sort((a,b) => a.verdict.localeCompare(b.verdict));
    if (sort === 'category')  list.sort((a,b) => a.cat.localeCompare(b.cat));
    if (sort === 'new')       list.sort((a,b) => a.addedDays - b.addedDays);
    return list;
  }, [sort]);

  return (
    <div style={s.page}>
      <DSNav />
      <InvCrumb />
      <InvHeader />
      <InvControls view={view} setView={setView} sort={sort} setSort={setSort} />
      <InvJumpStrip />
      <div style={{...s.inner, padding:'16px 56px 0', display:'grid', gridTemplateColumns:'220px 1fr', gap:32, alignItems:'flex-start'}}>
        <InvFilterRail />
        {view === 'register'
          ? <InvRegister tools={tools} />
          : <InvSetzkasten tools={tools} />}
      </div>
      <InvPagination />
      <InvColophon />
      <DSFooter />
    </div>
  );
}

    ['Soll mein Team Cursor, Copilot oder Claude Code einführen?',
     'Drei sehr unterschiedliche Versprechen — und nur eines passt zu Teams, die Code ernst nehmen.',
     'Wir haben drei Teams je eine Woche lang mit den drei Werkzeugen arbeiten lassen.'],
    ['Sind „KI-Tools ohne Anmeldung" wirklich datenschutzfreundlich?',

     'Sieben populäre Tools auf Tracking, Datenweitergabe und EU-Hosting geprüft — fünf senden Telemetrie.'],

    ['Wann lohnt ein KI-Schreibassistent wirklich?',
     'Nicht beim ersten Entwurf. Bei der dritten Überarbeitung.',
     'Wir haben drei Wochen lang gemessen, wo der Hebel kommt — und wo er nur Zeit kostet.'],
    ['Welcher Transkriptionsdienst für vertrauliche Gespräche?',
     'Genauigkeit ist nicht alles. Daten-Standort schon.',
     'Acht Anbieter im Vergleich, sortiert nach Hosting, Verschlüsselung und Mitarbeiterzugriff.'],
    ['Self-hosted Automation: lohnt n8n statt Zapier?',
     'Für kleine Teams selten. Für vertrauliche Workflows fast immer.',
     'Wir zeigen, wo die Grenze zwischen Convenience und Kontrolle wirklich verläuft.'],
    ['Sind KI-Recherchewerkzeuge wissenschaftstauglich?',
     'Als Einstieg ja. Als Quelle nie.',
     'Consensus, Elicit, Research Rabbit, Litmaps — wo sie helfen und wo sie täuschen.'],
    ['Lohnt sich ein eigener LLM-Server für mittelgrosse Teams?',
     'In den meisten Fällen nicht. In zwei Fällen schon.',
     'Wir rechnen die TCO über zwei Jahre durch und zeigen, ab wann Self-Hosting sich rechnet.'],
    ['Welcher Bildgenerator ist heute der richtige für Marketing?',
     'Es kommt nicht auf das Modell an. Es kommt auf den Prompt-Stack.',
     'Midjourney, Ideogram, Recraft, Krea — und warum die Auswahl meist eine Stil-Entscheidung ist.'],
    ['Wer haftet, wenn ein KI-Agent einen Fehler committet?',
     'Nicht der Anbieter. Auch nicht die KI.',
     'Eine Bestandsaufnahme der aktuellen Rechtslage in DACH — und warum Review-Prozesse Pflicht werden.'],
    ['Sollten wir KI-Detector-Tools im Bewerbungsprozess einsetzen?',
     'Nein. Die Fehlerquoten machen sie unbrauchbar.',
     'False-Positives in 20–30 % der Fälle — und was Personalabteilungen stattdessen tun können.'],
    ['Welche Meeting-Notes-Tools sind DSGVO-tauglich?',
     'Nicht die populärsten. Nicht die billigsten.',
     'Wir haben acht Anbieter geprüft — auf Hosting, DPA, Mitschriftenzugriff und Löschfristen.'],
    ['Lohnt sich Notion AI für Wissensteams?',
     'Wenn Sie ohnehin Notion nutzen — ja. Sonst kaum.',
     'Wo Notion AI über reine Spielerei hinausgeht — und wo es Spielerei bleibt.'],
    ['Sind Coding-Agenten 2026 produktionsreif?',
     'Für klar abgegrenzte Aufgaben: ja. Für komplexe Architekturen: noch nicht.',
     'Wir vergleichen Codex CLI, Claude Code, Gemini CLI und Replit Agent in echten Backlog-Aufgaben.'],
    ['Werden Personal-Assistant-Agenten dieses Jahr wirklich nützlich?',
     'Für wenige. Aber für die ist der Hebel echt.',
     'Wir testen vier autonome Assistenten zwei Wochen lang — Ergebnis und Grenzen.'],
    ['Was tun, wenn KI-generierter Code geleakte Lizenzen enthält?',
     'Erkennen. Dokumentieren. Ersetzen.',
     'Eine Praxisanleitung für Teams, die KI-Code in Produktion haben — bevor der Audit kommt.'],
  ];
  const today = new Date('2026-05-27');
  return headlines.map((h, i) => {
    const days = i * 5 + (i % 3) * 2;
    const date = new Date(today.getTime() - days * 86400000);
    const ymd = date.toISOString().slice(0,10).split('-').reverse().join('.');
    return {
      no: String(49 - i).padStart(3, '0'),

    };
  });
})();

            № {d.no}
          </span>
          <span style={{...s.mono, fontSize:10, color:p.vermillion, letterSpacing:'0.16em', textTransform:'uppercase', fontWeight:700}}>
            {d.section}
          </span>
        </div>
        <h3 style={{
          ...s.serifBold, fontSize:26, lineHeight:1.15, margin:'10px 0 8px', letterSpacing:'-0.015em'
        }}>
          {d.headline}
        </h3>
        <div style={{...s.serif, fontStyle:'italic', fontSize:17, lineHeight:1.4, color:p.inkSoft, margin:'0 0 12px'}}>
          {d.dek}
        </div>
        <p style={{...s.serif, fontSize:15, lineHeight:1.5, color:p.ink, margin:0}}>
          {d.excerpt}
        </p>
        <div style={{
          display:'flex', alignItems:'center', gap:12, marginTop:14, ...s.mono, fontSize:11, color:p.inkMid, letterSpacing:'0.04em', flexWrap:'wrap'
        }}>
          <span>{d.date}</span>
          <span style={{color:p.ruleHi}}>·</span>
          <span>{d.read} min</span>
          <span style={{color:p.ruleHi}}>·</span>
          <span>{d.by}</span>
          {d.tags.map(t => (
            <span key={t} style={{color:p.inkSoft}}>#{t}</span>
          ))}
        </div>
      </div>

      {/* Verdict marginalia */}
      <div style={{textAlign:'center', borderLeft:`1px solid ${p.ruleHi}`, paddingLeft:16, paddingTop:4}}>
        <div style={{...s.display, fontSize:52, color:v.color, lineHeight:0.95}}>{v.glyph}</div>
        <div style={{...s.mono, fontSize:9, color:v.color, letterSpacing:'0.12em', textTransform:'uppercase', fontWeight:700, marginTop:4}}>
          {v.label}
        </div>
      </div>
    </article>
  );
}

function RatgeberPagination() {
  const p = window.dsPalette, s = window.dsS;
  return (
    <div style={{
      ...s.inner, padding:'24px 56px 8px', marginTop:24,
      display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:16
    }}>
      <div style={{...s.mono, fontSize:11, color:p.inkMid, letterSpacing:'0.06em'}}>
        Seite 1 von 2 · 16 von 25 angezeigt
      </div>
      <div style={{display:'flex', gap:4, ...s.mono, fontSize:12}}>
        {['1','2'].map((n, i) => (
          <span key={i} style={{
            padding:'7px 14px', minWidth:32, textAlign:'center',
            border:`1px solid ${n === '1' ? p.ink : p.ruleHi}`,
            background: n === '1' ? p.ink : 'transparent',
            color: n === '1' ? p.paper : p.ink, fontWeight: n === '1' ? 700 : 400, cursor:'pointer'
          }}>{n}</span>
        ))}
        <span style={{
          padding:'7px 14px', border:`1px solid ${p.ink}`,
          background:p.paper, color:p.ink, fontWeight:600, marginLeft:6
        }}>Nächste →</span>
      </div>
    </div>
  );
}

window.DSRatgeber = DSRatgeber;


function App() {
  const [view, setView] = React.useState(() => {
    const h = location.hash.replace('#','');
    return ['sheet','akte','inv','rat'].includes(h) ? h : 'home';
  });
  React.useEffect(() => { location.hash = view; }, [view]);

  return (
    <React.Fragment>
      <div className="tabbar">
        <button className={view==='home'  ? 'active' : ''} onClick={() => setView('home')}>↳ Ausgabe</button>
        <button className={view==='sheet' ? 'active' : ''} onClick={() => setView('sheet')}>↳ Entscheidung</button>
        <button className={view==='akte'  ? 'active' : ''} onClick={() => setView('akte')}>↳ Tool-Akte</button>
        <button className={view==='inv'   ? 'active' : ''} onClick={() => setView('inv')}>↳ Inventar</button>
        <button className={view==='rat'   ? 'active' : ''} onClick={() => setView('rat')}>↳ Ratgeber-Archiv</button>
      </div>
      <div className="stage">
        <div className="frame">
          {view === 'home' ? <DSHome />
            : view === 'sheet' ? <DSSheet />
            : view === 'akte' ? <DSToolAkte />
            : view === 'inv' ? <DSInventar />
            : <DSRatgeber />}
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>


</body></html>
